<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Aditya Fertilizers — Pro Ledger</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="color-scheme" content="light"/>
  <meta name="theme-color" content="#0f766e"/>
  <link rel="icon" href="data:,">
  <!-- App styles (all CSS will be in app.css) -->
  <link rel="stylesheet" href="app.css"/>
</head>

<body>
  <!-- ===== Header / Topbar ===== -->
  <header id="appHeader" role="banner" aria-label="Application header">
    <button id="hamb" class="hamburger" aria-label="Open menu" aria-controls="drawer" aria-expanded="false">
      <svg width="18" height="12" viewBox="0 0 20 14" fill="none" aria-hidden="true">
        <rect y="0" width="20" height="2" rx="1"></rect>
        <rect y="6" width="20" height="2" rx="1"></rect>
        <rect y="12" width="20" height="2" rx="1"></rect>
      </svg>
    </button>

    <div class="brand">
      <div class="title">Aditya Fertilizers — Pro Ledger</div>
      <div class="subtitle" id="envBadge" aria-live="polite"></div>
    </div>

    <div class="top-actions">
      <button id="btnToday" class="btn ghost" type="button">Today</button>
      <div class="tiny">Status: <span id="statusLabel">Initializing…</span></div>
    </div>
  </header>

  <!-- ===== Main Layout ===== -->
  <main id="main" role="main">
    <!-- ===== Sidebar / Drawer ===== -->
    <aside id="drawer" class="drawer hide" role="navigation" aria-label="Admin menu">
      <div class="drawer-head">
        <div class="drawer-title">Admin Menu</div>
        <div class="small muted">Single admin</div>
      </div>

      <label for="companySelect">Company (select here)</label>
      <select id="companySelect" name="companySelect" aria-label="Select company"></select>

      <nav class="drawer-nav" aria-label="Primary">
        <button class="menu-item" id="menuDashboard" type="button">
          <div>Dashboard</div><div class="small">Overview</div>
        </button>

        <button class="menu-item" id="menuDaybook" type="button">
          <div>Day Book</div><div class="small">Date-wise transactions</div>
        </button>

        <button class="menu-item" id="menuSales" type="button">
          <div>Sales Register</div><div class="small">Daily sales entry</div>
        </button>

        <button class="menu-item" id="menuPurchases" type="button">
          <div>Purchase Register</div><div class="small">Supplier-wise purchases</div>
        </button>

        <button class="menu-item" id="menuLedger" type="button">
          <div>Ledger</div><div class="small">Tally-style accounts</div>
        </button>

        <button class="menu-item" id="menuParties" type="button">
          <div>Parties</div><div class="small">Customers / Suppliers</div>
        </button>

        <button class="menu-item" id="menuVouchers" type="button">
          <div>Vouchers</div><div class="small">Receipts / Payments / Journal</div>
        </button>

        <button class="menu-item" id="menuReports" type="button">
          <div>Reports</div><div class="small">P&L, stock, GST</div>
        </button>

        <button class="menu-item" id="menuManage" type="button">
          <div>Master Data</div><div class="small">Companies / Materials / Units</div>
        </button>
      </nav>

      <hr/>

      <div id="adminInfo" class="admin-info">
        <div class="admin-name" id="adminEmail">admin</div>
        <div class="tiny muted">Signed in automatically</div>
      </div>

      <hr/>

      <div class="small muted">Advanced</div>
      <button class="menu-item" id="menuExport" type="button">
        <div>Export data</div><div class="small">Download CSV (Excel)</div>
      </button>
      <button class="menu-item" id="menuExportLedger" type="button">
        <div>Export ledger</div><div class="small">Party-wise CSV</div>
      </button>
    </aside>

    <!-- ===== Content Area ===== -->
    <section class="content" id="contentRoot">
      <!-- Top bar inside content -->
      <div class="card topbar" id="topbarCard">
        <div class="company-title">
          <div class="company-name" id="mainCompanyName">Select a company</div>
          <div class="tiny muted">Company chosen in the menu</div>
        </div>

        <div class="qa">
          <label class="qa-label" for="qaGroup">Quick actions</label>
          <div class="controls" id="qaGroup">
            <button id="btnPurchase" class="btn" type="button">Add Purchase</button>
            <button id="btnSale" class="btn warn" type="button">Add Sale</button>
            <button id="btnVoucher" class="btn ghost" type="button">New Voucher</button>
            <button id="btnHistory" class="btn ghost" type="button">History</button>
            <button id="btnManage" class="btn ghost" type="button">Manage</button>
          </div>
        </div>

        <div class="last-updated">
          <div class="tiny">Last remote update</div>
          <div id="lastUpdated" class="last-updated-value">—</div>
        </div>
      </div>

      <!-- Global search / filters bar -->
      <div id="searchBar" class="card" role="search" aria-label="Global search" hidden>
        <form id="searchForm" autocomplete="off">
          <div class="search-row">
            <div class="search-field">
              <label for="searchText">Search</label>
              <input id="searchText" name="q" placeholder="Party / material / note / voucher no."/>
            </div>
            <div class="search-field">
              <label for="searchFrom">From</label>
              <input id="searchFrom" name="from" type="date"/>
            </div>
            <div class="search-field">
              <label for="searchTo">To</label>
              <input id="searchTo" name="to" type="date"/>
            </div>
            <div class="search-field">
              <label for="searchType">Type</label>
              <select id="searchType" name="type">
                <option value="">All</option>
                <option value="purchase">Purchase</option>
                <option value="sale">Sale</option>
                <option value="receipt">Receipt</option>
                <option value="payment">Payment</option>
                <option value="journal">Journal</option>
              </select>
            </div>
            <div class="search-actions">
              <button id="btnSearch" class="btn" type="submit">Search</button>
              <button id="btnSearchReset" class="btn ghost" type="button">Reset</button>
            </div>
          </div>
        </form>
      </div>

      <!-- ===== Routed / Swappable Areas (JS will render) ===== -->
      <div id="dashboardArea" class="route" data-route="dashboard" aria-live="polite"></div>
      <div id="daybookArea" class="route" data-route="daybook" hidden></div>
      <div id="salesArea" class="route" data-route="sales" hidden></div>
      <div id="purchasesArea" class="route" data-route="purchases" hidden></div>
      <div id="ledgerArea" class="route" data-route="ledger" hidden></div>
      <div id="partiesArea" class="route" data-route="parties" hidden></div>
      <div id="vouchersArea" class="route" data-route="vouchers" hidden></div>
      <div id="manageArea" class="route" data-route="manage" hidden></div>
      <div id="reportsArea" class="route" data-route="reports" hidden></div>

      <!-- Modals / Drawers mount point -->
      <div id="modalRoot" aria-live="assertive" aria-relevant="additions"></div>
    </section>
  </main>

  <!-- ===== Footer ===== -->
  <footer id="appFooter" role="contentinfo">
    © All rights reserved by ZeroCaps — Made by Abhinav ❤️
  </footer>

  <!-- ===== Hidden inputs & global loader ===== -->
  <input id="fileInput" type="file" accept=".json" hidden/>

  <div id="globalLoader" aria-hidden="true">
    <div class="loaderBox" role="alert" aria-busy="true">
      <div class="spinner" aria-hidden="true"></div>
      <div>
        <div class="loaderTitle" id="loaderTitle">Working…</div>
        <div class="loaderText tiny muted" id="loaderText">Please wait</div>
      </div>
    </div>
  </div>

  <!-- ===== Templates (pure HTML, JS clones & fills them) ===== -->

  <!-- Template: Empty State -->
  <template id="tpl-empty">
    <div class="card tiny muted">No data to display.</div>
  </template>

  <!-- Template: Material card (dashboard) -->
  <template id="tpl-material-card">
    <div class="mat-card">
      <div class="mat-name"></div>
      <div class="mat-qty"></div>
      <div class="mat-meta tiny muted"></div>
      <div class="mat-actions">
        <button class="btn mat-buy" type="button">Add Purchase</button>
        <button class="btn warn mat-sell" type="button">Add Sale</button>
        <button class="btn ghost mat-edit" type="button">Edit</button>
      </div>
      <div class="mat-split tiny muted">
        <span class="mat-price"></span>
        <span class="mat-stockval"></span>
      </div>
      <div class="mat-sales tiny muted"></div>
    </div>
  </template>

  <!-- Template: Ledger row (party ledger) -->
  <template id="tpl-ledger-row">
    <tr>
      <td class="led-date"></td>
      <td class="led-vno"></td>
      <td class="led-desc"></td>
      <td class="led-debit amount"></td>
      <td class="led-credit amount"></td>
      <td class="led-balance amount"></td>
      <td class="led-actions">
        <button class="btn ghost led-edit" type="button">Edit</button>
        <button class="btn danger led-delete" type="button">Delete</button>
      </td>
    </tr>
  </template>

  <!-- Template: Daybook card -->
  <template id="tpl-daybook-card">
    <div class="entry-card">
      <div class="entry-left">
        <span class="badge"></span>
        <div class="entry-core">
          <div class="entry-title"></div>
          <div class="entry-meta tiny muted"></div>
          <div class="entry-note tiny muted"></div>
        </div>
      </div>
      <div class="entry-right">
        <div class="entry-time tiny muted"></div>
        <div class="entry-actions">
          <button class="btn ghost entry-edit" type="button">Edit</button>
          <button class="btn danger entry-delete" type="button">Delete</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Template: Party row -->
  <template id="tpl-party-row">
    <tr>
      <td class="pty-name"></td>
      <td class="pty-type"></td>
      <td class="pty-phone"></td>
      <td class="pty-gst"></td>
      <td class="pty-balance amount"></td>
      <td class="pty-actions">
        <button class="btn ghost pty-ledger" type="button">Open Ledger</button>
        <button class="btn ghost pty-edit" type="button">Edit</button>
        <button class="btn danger pty-delete" type="button">Delete</button>
      </td>
    </tr>
  </template>

  <!-- Template: Voucher row -->
  <template id="tpl-voucher-row">
    <tr>
      <td class="vch-date"></td>
      <td class="vch-no"></td>
      <td class="vch-type"></td>
      <td class="vch-party"></td>
      <td class="vch-amount amount"></td>
      <td class="vch-actions">
        <button class="btn ghost vch-view" type="button">View</button>
        <button class="btn ghost vch-edit" type="button">Edit</button>
        <button class="btn danger vch-delete" type="button">Delete</button>
      </td>
    </tr>
  </template>

  <!-- Template: Tab header block (Reports) -->
  <template id="tpl-report-block">
    <div class="report-block">
      <div class="report-head">
        <div class="report-title"></div>
        <div class="report-sub tiny muted"></div>
      </div>
      <div class="report-body"></div>
    </div>
  </template>

  <!-- ===== App script (all JS logic lives in app.js) ===== -->
  <script type="module" src="app.js"></script>
</body>
</html>
